---
name: agent-validate
description: Cross-agent plugin/extension/skill validation
branding:
  icon: check-circle
  color: green

inputs:
  path:
    description: Directory to validate (default repo root)
    required: false
    default: "."
  skip:
    description: Comma-separated checks to skip
    required: false
    default: ""
  jsonlint-version:
    description: jsonlint-mod version
    required: false
    default: "1.7.6"
  yamllint-version:
    description: yamllint version
    required: false
    default: "1.37.0"
  markdownlint-version:
    description: markdownlint-cli version
    required: false
    default: "0.47.0"
  ruff-version:
    description: ruff version
    required: false
    default: "0.14.14"
  claude-code-version:
    description: claude-code version
    required: false
    default: "2.1.22"
  gemini-cli-version:
    description: gemini-cli version
    required: false
    default: "0.26.0"

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@49933ea5288caeca8642195f2ed94f379600c3f8  # v4.4.0
      with:
        node-version: "22"

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
      with:
        python-version: "3.13"

    - name: Install system tools
      shell: bash
      run: |
        pip install --quiet "yamllint==${{ inputs.yamllint-version }}"

    - name: Run validation
      shell: bash
      env:
        VALIDATE_SKIP: ${{ inputs.skip }}
        JSONLINT_VERSION: ${{ inputs.jsonlint-version }}
        YAMLLINT_VERSION: ${{ inputs.yamllint-version }}
        MARKDOWNLINT_VERSION: ${{ inputs.markdownlint-version }}
        RUFF_VERSION: ${{ inputs.ruff-version }}
        CLAUDE_CODE_VERSION: ${{ inputs.claude-code-version }}
        GEMINI_CLI_VERSION: ${{ inputs.gemini-cli-version }}
      run: ${{ github.action_path }}/validate.sh "${{ inputs.path }}"
