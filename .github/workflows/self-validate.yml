---
name: self-validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: "22"

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"

      - name: Lint shell scripts
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # v2.0.0
        with:
          version: v0.11.0
          ignore_paths: tests/fixtures

      - name: Lint YAML
        run: >-
          pip install --quiet yamllint &&
          yamllint -c defaults/.yamllint.yml
          defaults/.yamllint.yml action.yml
          .github/workflows/self-validate.yml
          .github/workflows/spec-freshness.yml
          .github/workflows/cli-regression.yml
          .github/dependabot.yml

      - name: Lint JSON
        run: npx --yes jsonlint-mod@1.7.6 -q defaults/.markdownlint.json

      - name: Lint Markdown
        run: >-
          npx --yes markdownlint-cli@0.47.0 '**/*.md'
          --ignore node_modules
          --ignore 'tests/fixtures/**'
          --ignore 'skills/spec-conformance/references/**'
          --config defaults/.markdownlint.json

      - name: Lint GitHub Actions workflows
        if: runner.os == 'Linux'
        uses: rhysd/actionlint@393031adb9afb225ee52ae2ccd7a5af5525e03e8  # v1.7.11

      - name: Run test suite
        run: ./tests/run.sh

  action-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Dogfood composite action
        uses: ./
        with:
          path: tests/fixtures/standalone-plugin
          skip: claude,gemini,pi

  action-test-fail:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run action against broken fixture
        id: validate
        uses: ./
        continue-on-error: true
        with:
          path: tests/fixtures/broken
          skip: claude,gemini,pi

      - name: Verify failure outputs
        run: |
          [[ "${{ steps.validate.outputs.result }}" == "fail" ]] || { echo "Expected result=fail"; exit 1; }
          [[ "${{ steps.validate.outputs.error-count }}" != "0" ]] || { echo "Expected error-count > 0"; exit 1; }
