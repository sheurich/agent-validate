---
name: self-validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642195f2ed94f379600c3f8  # v4.4.0
        with:
          node-version: "22"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.13"

      - name: Lint validate.sh
        run: shellcheck validate.sh tests/run.sh

      - name: Lint YAML
        run: >-
          pip install --quiet yamllint &&
          yamllint -c defaults/.yamllint.yml
          defaults/.yamllint.yml action.yml
          .github/workflows/self-validate.yml

      - name: Lint JSON
        run: npx --yes jsonlint-mod@1.7.6 -q defaults/.markdownlint.json

      - name: Lint Markdown
        run: >-
          npx --yes markdownlint-cli@0.47.0 '**/*.md'
          --ignore node_modules
          --config defaults/.markdownlint.json

      - name: Run test suite
        run: ./tests/run.sh

  action-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Dogfood composite action
        uses: ./
        with:
          path: tests/fixtures/standalone-plugin
          skip: claude,gemini,pi
