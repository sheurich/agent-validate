---
name: self-validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238  # v6.2.0
        with:
          node-version: "22"

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"

      - name: Lint validate.sh
        run: shellcheck validate.sh tests/run.sh

      - name: Lint YAML
        run: >-
          pip install --quiet yamllint &&
          yamllint -c defaults/.yamllint.yml
          defaults/.yamllint.yml action.yml
          .github/workflows/self-validate.yml
          .github/dependabot.yml

      - name: Lint JSON
        run: npx --yes jsonlint-mod@1.7.6 -q defaults/.markdownlint.json

      - name: Lint Markdown
        run: >-
          npx --yes markdownlint-cli@0.47.0 '**/*.md'
          --ignore node_modules
          --ignore 'tests/fixtures/**'
          --ignore 'skills/spec-conformance/references/**'
          --config defaults/.markdownlint.json

      - name: Run test suite
        run: ./tests/run.sh

  action-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Dogfood composite action
        uses: ./
        with:
          path: tests/fixtures/standalone-plugin
          skip: claude,gemini,pi
